<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduportol System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark">
    <div id="app">
        <!-- App content will be injected here -->
    </div>

    <!-- Templates -->
    <template id="login-template">
        <div class="min-h-screen flex items-center justify-center p-6 relative">
            <div class="noise-overlay"></div>
            <div class="atmosphere">
                <div class="bg-blob bg-blob-1"></div>
                <div class="bg-blob bg-blob-2"></div>
                <div class="bg-blob bg-blob-3"></div>
                <div class="bg-blob bg-blob-1" style="top: 60%; left: 80%; width: 40vw; height: 40vw; opacity: 0.08;"></div>
            </div>
            
            <div class="w-full max-w-md glass-card relative" id="login-card">
                <button id="back-to-login" class="absolute left-6 top-8 p-2 hover:bg-white/10 rounded-full transition-colors text-slate-400 hover:text-white hidden">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-rose-400 to-amber-400 bg-clip-text text-transparent mb-2" id="app-title">Eduportol System</h1>
                    <p class="text-slate-400 text-sm font-medium tracking-wide uppercase" id="form-type-label">Login</p>
                </div>

                <form id="auth-form" class="space-y-4">
                    <div class="flex p-1.5 glass-card !p-1.5 rounded-2xl mb-4">
                        <button type="button" data-role="Student" class="role-btn flex-1 py-2.5 rounded-xl text-[10px] font-bold transition-all uppercase tracking-wider bg-rose-600 text-white shadow-lg shadow-rose-500/30">Student</button>
                        <button type="button" data-role="Teacher" class="role-btn flex-1 py-2.5 rounded-xl text-[10px] font-bold transition-all uppercase tracking-wider text-slate-400 hover:text-slate-200">Teacher</button>
                        <button type="button" data-role="HOD" class="role-btn flex-1 py-2.5 rounded-xl text-[10px] font-bold transition-all uppercase tracking-wider text-slate-400 hover:text-slate-200">HOD</button>
                    </div>

                    <div class="space-y-4" id="form-fields">
                        <!-- Fields injected by JS -->
                    </div>

                    <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-bold text-sm text-white transition-all" id="submit-btn">Login</button>
                    
                    <div class="text-right" id="forgot-password-container">
                        <button type="button" id="forgot-password-btn" class="text-xs text-slate-500 hover:text-rose-400 transition-colors">Forgot Password?</button>
                    </div>
                </form>

                <div class="text-center pt-6 space-y-4">
                    <button id="toggle-auth" class="text-rose-400 hover:text-rose-300 text-sm font-medium transition-colors">Don't have an account? Register</button>
                    
                    <button id="reset-data-btn" class="text-[9px] text-slate-600 hover:text-rose-500 transition-colors uppercase tracking-tighter">Reset App Data</button>
                </div>
            </div>
            
            <div class="absolute bottom-8 left-0 right-0 text-center">
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">@ ALL RIGHTS ARE RESERVED TO P & A PVTLIMITED</p>
            </div>
        </div>
    </template>

    <template id="dashboard-template">
        <div class="min-h-screen pb-24 pt-28 px-6 relative">
            <div class="noise-overlay"></div>
            <div class="atmosphere">
                <div class="bg-blob bg-blob-1"></div>
                <div class="bg-blob bg-blob-2"></div>
                <div class="bg-blob bg-blob-3"></div>
                <div class="bg-blob bg-blob-1" style="top: 60%; left: 80%; width: 40vw; height: 40vw; opacity: 0.08;"></div>
            </div>
            
            <header class="fixed top-0 left-0 right-0 z-50 px-6 py-6">
                <div class="max-w-7xl mx-auto flex items-center justify-between glass-card !p-3 !px-8 rounded-[2rem] border-white/10 shadow-2xl">
                    <div class="flex items-center gap-4">
                        <button id="home-btn" class="w-12 h-12 bg-rose-600 rounded-2xl flex items-center justify-center shadow-xl shadow-rose-500/40 hover:bg-rose-500 transition-all hover:rotate-6 active:scale-95">
                            <i data-lucide="home" class="text-white" size="24"></i>
                        </button>
                        <div class="hidden sm:block">
                            <h2 class="text-xl font-black tracking-tighter" id="header-title">Eduportol System</h2>
                            <p class="text-[8px] uppercase tracking-[0.2em] font-bold text-slate-500">Smart System</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="notices-btn" class="p-2 hover:bg-white/10 rounded-lg transition-colors relative">
                            <i data-lucide="message-square"></i>
                            <span id="notice-badge" class="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full hidden"></span>
                        </button>

                        <div class="relative">
                            <button id="profile-toggle" class="w-10 h-10 rounded-full bg-gradient-to-tr from-rose-500 to-amber-400 p-0.5">
                                <div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center overflow-hidden">
                                    <i data-lucide="user-circle" class="text-rose-400 w-8 h-8"></i>
                                </div>
                            </button>

                            <div id="profile-dropdown" class="absolute right-0 mt-3 w-72 bg-white rounded-3xl p-6 shadow-[0_20px_50px_rgba(244,63,94,0.3)] overflow-y-auto max-h-[calc(100vh-120px)] custom-scrollbar text-slate-900 border border-rose-100 hidden">
                                <div class="flex items-center gap-4 mb-6 p-1">
                                    <div class="w-14 h-14 rounded-2xl bg-rose-100 flex items-center justify-center border border-rose-200">
                                        <i data-lucide="user-circle" class="text-rose-500 w-8 h-8"></i>
                                    </div>
                                    <div class="overflow-hidden">
                                        <p class="font-bold text-lg text-slate-900 truncate" id="profile-name"></p>
                                        <p class="text-xs text-rose-500 font-bold uppercase tracking-wider" id="profile-role"></p>
                                    </div>
                                </div>

                                <div class="space-y-4">
                                    <div class="grid grid-cols-2 gap-3">
                                        <button id="lang-toggle" class="flex flex-col items-center justify-center gap-2 p-3 bg-rose-50 hover:bg-rose-100 rounded-2xl border border-rose-100 transition-all group">
                                            <i data-lucide="globe" class="text-rose-500 group-hover:scale-110 transition-transform"></i>
                                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500" id="lang-label">Marathi</span>
                                        </button>
                                        <button id="theme-toggle" class="flex flex-col items-center justify-center gap-2 p-3 bg-amber-50 hover:bg-amber-100 rounded-2xl border border-amber-100 transition-all group">
                                            <i data-lucide="sun" id="theme-icon" class="text-amber-500 group-hover:scale-110 transition-transform"></i>
                                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500" id="theme-label">Light</span>
                                        </button>
                                    </div>

                                    <div class="bg-slate-50 rounded-2xl p-4 space-y-3 border border-slate-100" id="profile-info">
                                        <!-- Info injected by JS -->
                                    </div>

                                    <div class="grid grid-cols-2 gap-3">
                                        <button id="profile-complaints-btn" class="flex flex-col items-center justify-center gap-2 p-3 bg-rose-50 hover:bg-rose-100 rounded-2xl border border-rose-100 transition-all group">
                                            <i data-lucide="alert-circle" class="text-rose-500 group-hover:scale-110 transition-transform"></i>
                                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Complaint</span>
                                        </button>
                                        <button id="profile-contact-btn" class="flex flex-col items-center justify-center gap-2 p-3 bg-amber-50 hover:bg-amber-100 rounded-2xl border border-amber-100 transition-all group">
                                            <i data-lucide="phone" class="text-amber-500 group-hover:scale-110 transition-transform"></i>
                                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Contact</span>
                                        </button>
                                    </div>

                                    <a href="http://www.unishivaji.ac.in/" target="_blank" class="w-full flex items-center justify-between p-3 bg-indigo-50 hover:bg-indigo-100 rounded-2xl border border-indigo-100 transition-all group">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-indigo-500 shadow-sm">
                                                <i data-lucide="globe" size="16" class="group-hover:scale-110 transition-transform"></i>
                                            </div>
                                            <div class="text-left">
                                                <p class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Official Website Support</p>
                                                <p class="text-xs font-bold text-indigo-900">Shivaji University</p>
                                            </div>
                                        </div>
                                        <i data-lucide="external-link" class="text-indigo-400" size="16"></i>
                                    </a>

                                    <button id="logout-btn" class="w-full flex items-center justify-center gap-2 py-3.5 bg-rose-500 hover:bg-rose-600 text-white rounded-2xl transition-all text-sm font-bold shadow-lg shadow-rose-200">
                                        <i data-lucide="log-out"></i>
                                        Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="max-w-7xl mx-auto pb-24" id="dashboard-content">
                <!-- Dashboard specific content injected by JS -->
            </main>

            <footer class="fixed bottom-0 left-0 right-0 z-40 px-6 py-4">
                <div class="max-w-7xl mx-auto flex flex-col items-center justify-center gap-2">
                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] font-bold">@ ALL RIGHTS ARE RESERVED TO P & A PVTLIMITED</p>
                </div>
            </footer>
        </div>
    </template>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div id="modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div id="modal-content" class="relative w-full max-w-md bg-white rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 shadow-[0_20px_60px_rgba(0,0,0,0.2)] text-slate-900 border border-rose-100 mx-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 id="modal-title" class="text-2xl font-bold bg-gradient-to-r from-rose-600 to-amber-500 bg-clip-text text-transparent"></h2>
                <button id="modal-close" class="p-2 hover:bg-rose-50 text-slate-400 hover:text-rose-500 rounded-full transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="modal-body" class="text-slate-600"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full glass flex items-center gap-3 z-[200] hidden">
        <i id="toast-icon"></i>
        <span id="toast-message" class="font-medium"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
